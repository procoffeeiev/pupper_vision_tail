# Vision-Reactive Pupper tunable parameters.
# Edit these to retune gains/thresholds without touching code.

approach:
  person_class_id: 0         # COCO: 0 = person
  min_confidence: 0.5        # drop detections below this (tau in the proposal)
  k_yaw: 2.0                 # rad/s per unit of normalized_x (range [-0.5, 0.5])
  yaw_deadband: 0.03         # image-fraction below which we don't yaw
  v_max: 0.35                # m/s forward cap
  a_slow: 80000.0            # px^2 bbox area at which we start decelerating
  a_stop: 240000.0           # px^2 bbox area at which we fully stop
  max_angular_z: 1.5         # rad/s safety cap

tail:
  serial_port: /dev/ttyACM0  # ESP32-S3 USB CDC device running tailmovement firmware
  baudrate: 115200           # must match tailmovement/src/main.cpp
  startup_delay_s: 2.0       # allow the MCU USB serial port to enumerate/reset
  write_interval_s: 0.1      # serial command rate limit
  watchdog_timeout_s: 0.5    # ESP32 centers the tail if commands stop arriving
  wag_frequency_hz: 3.0      # matches the main wag frequency in the ESP32 firmware
  envelope_frequency_hz: 0.5 # slow amplitude envelope for more organic motion
  amplitude_epsilon_us: 8    # resend only after a meaningful amplitude change
  wag_start_area: 240000.0   # start wagging once the person is at stop distance
  wag_full_area: 360000.0    # clamp to max wag amplitude at this bbox area
  amplitude_min_us: 80       # first nonzero wag amplitude once active
  amplitude_max_us: 250      # largest wag amplitude sent to the ESP32

runtime:
  loop_hz: 10.0              # control loop rate; detector runs ~5 Hz
  detection_image_width: 1400.0 # incoming RT-DETR stream width in pixels
  tail_enable_hardware: true # set false on dev machines with no serial tail
